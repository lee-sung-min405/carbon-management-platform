services:
  postgres:
    image: postgres:16-alpine
    container_name: carbon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: carbon
      POSTGRES_DB: carbon
    ports:
      - "5432:5432"
    volumes:
      - carbon-pg-data:/var/lib/postgresql/data

volumes:
  carbon-pg-data:
